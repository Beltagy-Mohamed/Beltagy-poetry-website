<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2A0F1F"/>
      <stop offset="100%" stop-color="#0D0609"/>
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D880"/>
      <stop offset="35%" stop-color="#D4903A"/>
      <stop offset="65%" stop-color="#C5A059"/>
      <stop offset="100%" stop-color="#F2D880"/>
    </linearGradient>
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.2"/>

  <!-- Islamic 8-point star ornament (top) -->
  <g transform="translate(256, 80)" filter="url(#glow-f)">
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="url(#gold-grad)" opacity="0.8"/>
    <path d="M-12,-12 L0,-18 L12,-12 L18,0 L12,12 L0,18 L-12,12 L-18,0 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- 🪶 Stylised Arabic Quill / Feather (main logo mark) -->
  <g transform="translate(256, 260)" filter="url(#glow-f)">
    <!-- Quill shaft -->
    <path d="M-4,120 Q-3,60 0,-30 Q3,-100 20,-150" stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Left vane -->
    <path d="M20,-150 Q60,-90 50,-20 Q40,40 -4,120 Q-20,80 -30,30 Q-45,-30 20,-150 Z"
          fill="url(#gold-grad)" opacity="0.85"/>
    <!-- Right vane / shadow -->
    <path d="M20,-150 Q-30,-90 -35,0 Q-38,50 -4,120 Q-20,80 -30,30 Q-45,-30 20,-150 Z"
          fill="#C5A059" opacity="0.45"/>
    <!-- Vane detail lines -->
    <path d="M20,-150 Q10,-80 -8,10 Q-10,50 -4,120" stroke="#F2D880" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.35" fill="none"/>
    <!-- Quill tip -->
    <ellipse cx="20" cy="-152" rx="6" ry="3" fill="#F2D880" transform="rotate(-30 20 -152)"/>
  </g>

  <!-- Islamic bottom ornament line -->
  <g transform="translate(256, 420)" opacity="0.6">
    <path d="M-80,0 Q-40,-8 0,0 T80,0" stroke="url(#gold-grad)" stroke-width="2" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="url(#gold-grad)"/>
    <circle cx="-40" cy="-3" r="2.5" fill="url(#gold-grad)" opacity="0.6"/>
    <circle cx="40" cy="-3" r="2.5" fill="url(#gold-grad)" opacity="0.6"/>
  </g>

  <!-- Small Islamic star (bottom) -->
  <g transform="translate(256, 445)" opacity="0.5">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="url(#gold-grad)"/>
  </g>
</svg>

  author = "بلتاجي الرمحي"
  description = "ديوان المهندس الشاعر بلتاجي الرمحي: إطلالة شخصية على عراقة الشعر النبطي البدوي وتراث بادية الفيوم والصحراء الغربية بمصر. يمزج الموقع بين أصالة أدب برقة، وتوثيق التراث الشفاهي، وبين فيض الخاطر ومقتبسات من أمهات الكتب الأدبية والفكرية والتاريخية وغيرها؛ في تجربة أدبية تجمع بين هندسة الكلمة وعمق الهوية."
  # الكلمات المفتاحية للبحث (SEO Keywords)

{{ define "title" }}{{ .Title }}{{ end }}
{{ define "main" }}

<!-- Header -->
<div class="relative py-24 overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[700px] h-[350px] rounded-full pointer-events-none"
         style="background: radial-gradient(ellipse, rgba(212,144,58,0.12), transparent); filter: blur(80px);"></div>
    <div class="container mx-auto px-4 sm:px-6 text-center relative z-10">
        <p class="text-xs font-black tracking-widest uppercase mb-5 font-ibm" style="color:var(--gold-400);" data-aos="fade-down">الأعمال الشعرية</p>
        <h1 class="text-5xl md:text-7xl font-black font-sch mb-5" style="color:var(--ink-900);" data-aos="fade-up">{{ .Title }}</h1>
        <div class="section-divider mx-auto" data-aos="fade-up" data-aos-delay="80"></div>
        {{ with .Content }}
        <div class="mt-6 font-ibm max-w-lg mx-auto" style="color:var(--ink-500);" data-aos="fade-up" data-aos-delay="140">{{ . }}</div>
        {{ end }}
    </div>
</div>

<!-- Grid -->
<div class="container mx-auto px-4 sm:px-6 pb-24">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-7">
        {{ range .Pages }}
        <div data-aos="fade-up">
            <a href="{{ .Permalink }}" class="poem-block h-full flex flex-col p-7 hover:no-underline block">
                <h2 class="text-xl font-black font-sch text-center mt-2 mb-4 gradient-text-gold">{{ .Title }}</h2>
                {{ if .Params.key_verse }}
                <div class="relative py-3 px-5 my-1">
                    <span class="text-3xl absolute top-0 right-2 leading-none font-amiri opacity-20" style="color:var(--gold-400);">"</span>
                    <p class="text-center italic leading-loose text-base" style="font-family: 'Poppins', sans-serif !important; color: #C5A059 !important;">
                        {{ .Params.key_verse }}
                    </p>
                    <span class="text-3xl absolute bottom-0 left-2 leading-none font-amiri opacity-20" style="color:var(--gold-400);">"</span>
                </div>
                {{ end }}
                <div class="mt-auto pt-4 flex items-center justify-between text-xs" style="color:var(--ink-500); opacity:0.7; border-top:1px solid rgba(212,144,58,0.12);">

                    <!-- Ink-spread read button -->
                    <span class="btn-ink text-xs px-4 py-1.5 gap-1">
                        اقرأ المزيد
                    </span>
                </div>
            </a>
        </div>
        {{ end }}
    </div>
</div>

{{ end }}
